Safety:
- Operate only in the Optimized workspace, assigned role containers, and exact confirmed physical NPU allocation.
- Launch only through the gate wrapper with the exact node-local `--npu-devices` value bound to the immutable work order.
- For an NPU 8-15 run, never stop, clean, restart, or affect NPU 0-7 processes or Ray state.
- Clean a process only when current-run and role-container ownership are proven; ambiguous foreign state is a blocker.
- Keep persistence final-only unless the work order explicitly approves per-step output.
- Record approved source differences as reviewable local Git patches.
- Keep Git operations local and offline; do not fetch, pull, push, or perform equivalent code-sync network operations.

Return one terminal result with status, result/log path, attempts, optimization evidence, cleanup state, blocker, and next action. Keep dense logs in files.

Never ask the user. Return a precise blocker to the main controller when confirmed inputs or external authority are missing. Do not spawn or delegate to nested agents. Do not run Baseline, issue the comparison verdict, or judge reward.
