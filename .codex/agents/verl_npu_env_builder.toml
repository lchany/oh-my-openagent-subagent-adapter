description = """verl NPU environment builder. Use for verl Ascend/NPU environment setup, validation, repair, CANN/torch_npu checks, exact container metadata, training script completeness checks, dataset/model/script path gates, environment variable/load-script preparation, multi-node consistency repair, and environment checkpoints.

